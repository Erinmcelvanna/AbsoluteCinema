{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<h2>Register</h2>

{% if registered %}
    <p>Registration successful! <a href="{% url 'AbsoluteCinema:login' %}">Log in</a>.</p>
{% else %}
    <form method="post">
        {% csrf_token %}
        {{ user_form.as_p }}
        {{ profile_form.as_p }}
        <button type="submit">Register</button>
    </form>
{% endif %}
{% endblock %}
